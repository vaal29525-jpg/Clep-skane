<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clap Pro Max Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #video { width: 100%; height: 100vh; object-fit: cover; }
        .ui { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; pointer-events: none; }
        .scan-area { width: 250px; height: 250px; border: 4px solid #007aff; border-radius: 40px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.8); position: relative; }
        .line { position: absolute; width: 100%; height: 2px; background: #fff; top: 0; animation: move 2.5s infinite linear; }
        @keyframes move { from { top: 0%; } to { top: 100%; } }
        .info { position: fixed; bottom: 40px; background: rgba(255,255,255,0.1); padding: 15px 30px; border-radius: 50px; backdrop-filter: blur(10px); }
        #result { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; z-index: 100; }
    </style>
</head>
<body>
    <video id="video"></video>
    <div class="ui">
        <div class="scan-area"><div class="line"></div></div>
        <div class="info">Сканер готовий до 500 кодів</div>
    </div>
    <div id="result"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const validCodes = new Set();
        const usedCodes = new Set();

        // Ініціалізація 500 кодів (CLAP-1001 до CLAP-1500)
        for(let i = 1001; i <= 1500; i++) {
            validCodes.add(`CLAP-${i}`);
        }

        function showStatus(text, color) {
            const res = document.getElementById('result');
            res.innerText = text;
            res.style.background = color;
            res.style.display = 'flex';
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred(text.includes('OK') ? 'success' : 'error');
            setTimeout(() => { res.style.display = 'none'; processing = false; }, 2500);
        }

        let processing = false;
        const reader = new ZXing.BrowserQRCodeReader();

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('video').srcObject = stream;
                document.getElementById('video').play();

                reader.decodeFromVideoDevice(undefined, 'video', (result) => {
                    if (result && !processing) {
                        processing = true;
                        const code = result.getText().trim();
                        
                        if (validCodes.has(code)) {
                            if (!usedCodes.has(code)) {
                                usedCodes.add(code);
                                showStatus("✅ КВИТОК OK", "#28a745");
                                tg.sendData("USED:" + code);
                            } else {
                                showStatus("❌ ПОВТОР!", "#dc3545");
                            }
                        } else {
                            showStatus("⚠️ НЕВІДОМИЙ", "#ff9500");
                        }
                    }
                });
            } catch (e) { alert("Помилка камери"); }
        }

        window.onload = initCamera;
    </script>
</body>
</html>
