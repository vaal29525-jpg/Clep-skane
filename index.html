<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; background: #000; color: #fff; overflow: hidden; }
        #reader { width: 100vw; height: 75vh; background: #000; }
        #status-bar { padding: 20px; font-size: 18px; font-weight: bold; background: #111; transition: 0.3s; border-bottom: 3px solid #3390ec; }
        .welcome { background: #008000 !important; } /* Зелений */
        .already { background: #ff0000 !important; } /* Червоний */
    </style>
</head>
<body>
    <div id="status-bar">ОЧІКУВАННЯ КВИТКА</div>
    <div id="reader"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const botToken = '8798649772:AAGIAKWXsgfheC4dw5JhFcGF0EotWFYoaZE';
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : '5035520641';
        
        let isLock = false;
        const scanner = new Html5Qrcode("reader");

        async function onScan(decodedText) {
            if (isLock) return;
            isLock = true;

            const bar = document.getElementById('status-bar');
            bar.innerText = "ОБРОБКА...";
            bar.className = "";

            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: userId,
                        text: `CHECK:${decodedText}`
                    })
                });
                
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                
                // Тимчасово показуємо статус "Відправлено"
                bar.innerText = "ВІДПРАВЛЕНО НА ПЕРЕВІРКУ";
                
            } catch (e) {
                bar.innerText = "ПОМИЛКА МЕРЕЖІ";
            }

            // Через 2.5 секунди скидаємо сканер для наступного гостя
            setTimeout(() => {
                bar.innerText = "СКАНУЙТЕ НАСТУПНИЙ";
                bar.className = "";
                isLock = false;
            }, 2500);
        }

        scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 260 }, onScan);
    </script>
</body>
</html>
