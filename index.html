<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; background: #000; color: #fff; overflow: hidden; }
        #reader { width: 100vw; height: 75vh; background: #000; }
        #status-bar { padding: 20px; font-size: 20px; font-weight: bold; background: #111; transition: 0.3s; border-bottom: 3px solid #3390ec; }
        .welcome { background: #008000 !important; color: #fff; } /* Зелений */
        .already-in { background: #ff0000 !important; color: #fff; } /* Червоний */
        .processing { background: #3390ec !important; } /* Синій */
    </style>
</head>
<body>
    <div id="status-bar">ГОТОВИЙ ДО СКАНУВАННЯ</div>
    <div id="reader"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const botToken = '8798649772:AAGIAKWXsgfheC4dw5JhFcGF0EotWFYoaZE';
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : '5035520641';
        
        let isScanning = true;
        const scanner = new Html5Qrcode("reader");

        async function onScan(decodedText) {
            if (!isScanning) return;
            isScanning = false;

            const bar = document.getElementById('status-bar');
            bar.innerText = "ОБРОБКА...";
            bar.className = "processing";

            try {
                // Відправляємо боту запит на перевірку
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: userId,
                        text: `CHECK:${decodedText}`
                    })
                });

                // Тут ми не можемо отримати відповідь від бота прямо в fetch, 
                // тому ми покладаємося на логіку паузи.
                // Для 500 людей важливо, щоб ти бачив результат у самому чаті боту.
                
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

            } catch (e) {
                bar.innerText = "ПОМИЛКА МЕРЕЖІ";
            }

            // Пауза 2 секунди, щоб ти побачив результат у чаті і полоска скинулась
            setTimeout(() => {
                bar.className = "";
                bar.innerText = "СКАНУЙТЕ НАСТУПНИЙ";
                isScanning = true;
            }, 2000);
        }

        scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 260 }, onScan);
    </script>
</body>
</html>
