<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clap Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { margin:0; background:#000; color:#fff; height:100vh; overflow:hidden; font-family:sans-serif; }
        .header { padding:15px; text-align:center; background:#111; font-size:18px; }
        #reader { width:100%; height:calc(100vh - 130px); }
        .footer { position:fixed; bottom:0; left:0; right:0; background:rgba(0,0,0,0.8); padding:15px; text-align:center; }
        button { padding:15px 30px; font-size:17px; background:#007AFF; color:white; border:none; border-radius:12px; }
    </style>
</head>
<body>
    <div class="header">CLAP SCANNER PRO</div>
    <div id="reader"></div>
    <div class="footer">
        <div id="status">Наведи камеру на QR-код</div>
        <button onclick="restart()">ПЕРЕЗАПУСТИТИ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let scanner = null;

        function startScanner() {
            scanner = new Html5Qrcode("reader");
            scanner.start(
                { facingMode: "environment" },
                { fps: 20, qrbox: { width: 260, height: 260 } },
                (decodedText) => {
                    tg.HapticFeedback.notificationOccurred("success");
                    document.getElementById("status").innerHTML = `✅ ${decodedText}`;
                    tg.sendData(decodedText);
                },
                () => {}
            ).catch(console.error);
        }

        function restart() {
            if (scanner) scanner.stop().then(startScanner);
            else startScanner();
        }

        window.onload = startScanner;
    </script>
</body>
</html>
