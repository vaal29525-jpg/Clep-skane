<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; background: #000; color: white; overflow: hidden; }
        #reader { width: 100vw; height: 70vh; background: #000; }
        #info { padding: 20px; font-size: 20px; font-weight: bold; background: #111; }
        .blink { animation: blinker 0.5s linear; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="info">ГОТОВИЙ ДО СКАНУВАННЯ</div>
    <div id="reader"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const botToken = '8798649772:AAGIAKWXsgfheC4dw5JhFcGF0EotWFYoaZE';
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : '5035520641';
        
        let isLock = false;
        const scanner = new Html5Qrcode("reader");

        async function onScan(decodedText) {
            if (isLock) return;
            isLock = true;

            // Візуальний відгук (мигтіння)
            document.getElementById('info').innerText = "ОБРОБКА... ⏳";
            document.body.classList.add('blink');

            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: userId,
                        text: `CHECK:${decodedText}`
                    })
                });
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            } catch (e) {
                console.error(e);
            }

            // Через 2 секунди сканер знову готовий до будь-якого коду
            setTimeout(() => {
                document.body.classList.remove('blink');
                document.getElementById('info').innerText = "СКАНУЙТЕ НАСТУПНИЙ";
                isLock = false;
            }, 2000);
        }

        scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScan);
    </script>
</body>
</html>
