<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Secure Clap Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }
        #camera-feed { width: 100%; height: 100vh; object-fit: cover; }
        
        .scanner-overlay { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5; pointer-events: none; }
        .target-box { width: 280px; height: 280px; border: 2px solid rgba(255,255,255,0.5); border-radius: 60px; position: relative; box-shadow: 0 0 0 2000px rgba(0,0,0,0.8); }
        .target-box::before { content: ''; position: absolute; inset: -5px; border: 4px solid #007aff; border-radius: 65px; clip-path: inset(0 0 80% 80%); } /* Куточки */
        
        .scan-animation { position: absolute; width: 90%; left: 5%; height: 2px; background: #007aff; top: 10%; animation: scanLine 2.5s infinite linear; box-shadow: 0 0 20px #007aff; }
        @keyframes scanLine { 0%, 100% { top: 10%; } 50% { top: 90%; } }

        .bottom-ui { position: fixed; bottom: 40px; width: 80%; background: rgba(20,20,20,0.9); backdrop-filter: blur(15px); padding: 15px 20px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); text-align: center; pointer-events: auto; }
        #status-text { font-size: 16px; font-weight: 600; color: #007aff; }

        #alert-layer { position: fixed; inset: 0; z-index: 100; display: none; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 20px; animation: popIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <video id="camera-feed" playsinline></video>
    
    <div class="scanner-overlay">
        <div class="target-box"><div class="scan-animation"></div></div>
        <div class="bottom-ui">
            <div id="status-text">ПОШУК QR-КОДУ...</div>
            <button onclick="restartCamera()" style="margin-top:10px; background:none; border:1px solid #444; color:#888; padding:5px 15px; border-radius:10px; font-size:12px;">ПЕРЕЗАВАНТАЖИТИ КАМЕРУ</button>
        </div>
    </div>

    <div id="alert-layer">
        <h1 id="alert-title" style="font-size: 40px; margin: 0;"></h1>
        <p id="alert-body" style="font-size: 20px;"></p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const videoElem = document.getElementById('camera-feed');
        const codeReader = new ZXing.BrowserQRCodeReader();
        const usedCodes = new Set();
        let isLocked = false;

        // Коди тепер не по порядку, але ми знаємо діапазон CLP-100 до CLP-999
        function isValidClapCode(code) {
            const pattern = /^CLP-\d{3}$/;
            return pattern.test(code);
        }

        async function restartCamera() {
            if (videoElem.srcObject) {
                videoElem.srcObject.getTracks().forEach(t => t.stop());
            }
            initScanner();
        }

        async function initScanner() {
            try {
                // ПРЯМА ВКАЗІВКА: ЗАДНЯ КАМЕРА
                const constraints = {
                    video: { 
                        facingMode: { exact: "environment" }, // На багатьох телефонах тільки так працює задня
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };
                
                let stream;
                try {
                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                } catch(e) {
                    // Якщо "exact environment" видав помилку, пробуємо м'який режим
                    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                }

                videoElem.srcObject = stream;
                videoElem.setAttribute("playsinline", true);
                await videoElem.play();

                codeReader.decodeFromVideoDevice(undefined, 'camera-feed', (result, err) => {
                    if (result && !isLocked) {
                        const code = result.getText().trim();
                        if (isValidClapCode(code)) {
                            handleResult(code);
                        }
                    }
                });
            } catch (err) {
                console.error(err);
                document.getElementById('status-text').innerText = "ПОМИЛКА КАМЕРИ";
            }
        }

        function handleResult(code) {
            isLocked = true;
            const alertLayer = document.getElementById('alert-layer');
            const title = document.getElementById('alert-title');
            
            if (!usedCodes.has(code)) {
                usedCodes.add(code);
                title.innerText = "✅ ДОСТУП";
                alertLayer.style.background = "#28a745";
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                tg.sendData("SCANNED:" + code);
            } else {
                title.innerText = "❌ ПОВТОР";
                alertLayer.style.background = "#dc3545";
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            }

            alertLayer.style.display = 'flex';
            setTimeout(() => {
                alertLayer.style.display = 'none';
                isLocked = false;
            }, 3000);
        }

        window.onload = initScanner;
    </script>
</body>
</html>
