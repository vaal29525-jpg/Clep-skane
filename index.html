<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clap Scanner Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { margin:0; background:#000; color:#fff; font-family:sans-serif; height:100vh; overflow:hidden; }
        .header { padding:16px; text-align:center; background:#111; font-size:18px; font-weight:600; }
        #reader { width:100%; height:calc(100vh - 160px); }
        .footer { position:fixed; bottom:0; left:0; right:0; background:rgba(0,0,0,0.95); padding:12px; text-align:center; }
        button { padding:15px 30px; font-size:17px; background:#007AFF; color:white; border:none; border-radius:12px; }
        #status { margin:8px 0; font-size:15px; min-height:20px; }
    </style>
</head>
<body>

    <div class="header">CLAP SCANNER PRO</div>
    <div id="reader"></div>

    <div class="footer">
        <div id="status">Наведи на QR-код...</div>
        <button onclick="restartScanner()">ПЕРЕЗАПУСТИТИ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.disableVerticalSwipes();

        let html5QrCode = null;

        function startScanner() {
            document.getElementById("status").innerHTML = "Запуск камери...";

            html5QrCode = new Html5Qrcode("reader");

            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 20, qrbox: { width: 260, height: 260 } },
                (decodedText) => {
                    tg.HapticFeedback.notificationOccurred("success");
                    document.getElementById("status").innerHTML = `✅ <b>Зчитано:</b><br>${decodedText}`;

                    // Відправка в бот з затримкою
                    setTimeout(() => {
                        tg.sendData(decodedText);
                        console.log("Відправлено в бот:", decodedText);
                    }, 400);
                },
                () => {} // ігнор помилок
            ).catch(err => {
                document.getElementById("status").textContent = "Помилка запуску камери";
            });
        }

        function restartScanner() {
            if (html5QrCode) html5QrCode.stop().then(startScanner);
            else startScanner();
        }

        window.onload = startScanner;
    </script>
</body>
</html>
