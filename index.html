<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clap Scanner Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; color:#fff; font-family: -apple-system, sans-serif; height:100vh; overflow:hidden; }
        .header { padding:16px; text-align:center; background:#111; font-size:18px; font-weight:600; }
        #reader { width:100%; height:calc(100vh - 130px); }
        .footer { position:fixed; bottom:0; left:0; right:0; background:rgba(0,0,0,0.85); padding:15px; text-align:center; }
        button { padding:16px 32px; font-size:17px; font-weight:600; background:#007AFF; color:white; border:none; border-radius:14px; }
        #status { margin-top:8px; font-size:15px; color:#0f0; }
    </style>
</head>
<body>

    <div class="header">CLAP SCANNER PRO</div>
    <div id="reader"></div>

    <div class="footer">
        <div id="status">Наведи камеру на QR-код</div>
        <button onclick="restart()">ПЕРЕЗАПУСТИТИ СКАНЕР</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let scanner = null;

        function startScanner() {
            document.getElementById("status").textContent = "Запуск камери...";

            scanner = new Html5Qrcode("reader");

            const config = { fps: 20, qrbox: { width: 260, height: 260 } };

            scanner.start(
                { facingMode: "environment" },
                config,
                (decodedText) => {
                    tg.HapticFeedback.notificationOccurred("success");
                    document.getElementById("status").innerHTML = `✅ <b>${decodedText}</b>`;
                    tg.sendData(decodedText);
                },
                (error) => {}
            ).catch(err => {
                document.getElementById("status").textContent = "Помилка запуску камери";
                console.error(err);
            });
        }

        function restart() {
            if (scanner) scanner.stop().then(startScanner);
            else startScanner();
        }

        window.onload = startScanner;
    </script>
</body>
</html>
