<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuickScan</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .box { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 220px; height: 220px; border: 2px solid #007AFF; border-radius: 20px; pointer-events: none; }
        .status { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #007AFF; font-family: sans-serif; font-weight: bold; }
    </style>
</head>
<body>
    <video id="video"></video>
    <div class="box"></div>
    <div class="status">ПОШУК QR...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const reader = new ZXing.BrowserQRCodeReader();
        let sent = false;

        async function init() {
            try {
                const devices = await reader.listVideoInputDevices();
                const back = devices.find(d => d.label.includes('back')) || devices[0];
                
                reader.decodeFromVideoDevice(back.deviceId, 'video', (result) => {
                    if (result && !sent) {
                        sent = true;
                        tg.HapticFeedback.impactOccurred('medium');
                        tg.sendData(result.getText()); // Відправка миттєва без затримок
                    }
                });
            } catch (e) { document.querySelector('.status').innerText = "ERROR"; }
        }
        init();
    </script>
</body>
</html>
