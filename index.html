<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin:0; background:#000; display:flex; justify-content:center; align-items:center; height:100vh; }
        #video { width:100%; height:100%; object-fit:cover; }
    </style>
</head>
<body>
    <video id="video"></video>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const codeReader = new ZXing.BrowserQRCodeReader();

        async function initCamera() {
            try {
                // Примусовий запит дозволів перед запуском сканера
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                stream.getTracks().forEach(track => track.stop()); // Зупиняємо технічний потік

                // Запуск бібліотеки після успішного дозволу
                codeReader.decodeFromVideoDevice(undefined, 'video', (result, err) => {
                    if (result) {
                        tg.sendData(result.getText()); // Відправляємо і закриваємо
                        window.close(); 
                    }
                });
            } catch (err) {
                alert("Помилка доступу: " + err.message);
            }
        }

        initCamera();
    </script>
</body>
</html>
