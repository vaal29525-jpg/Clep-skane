<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; background: #000; color: white; transition: 0.3s; overflow: hidden; }
        #reader { width: 100vw; height: 70vh; background: #000; }
        #info { padding: 20px; font-size: 22px; font-weight: bold; text-transform: uppercase; }
        .success { background: #006400 !important; } /* Зелений - відправлено */
        .scanned-already { background: #8b0000 !important; } /* Червоний - повтор */
    </style>
</head>
<body>
    <div id="info">СКАНУЙТЕ КВИТОК</div>
    <div id="reader"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const botToken = '8798649772:AAGIAKWXsgfheC4dw5JhFcGF0EotWFYoaZE';
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : '5035520641';
        
        let lastCode = "";
        let isProcessing = false;
        const scanner = new Html5Qrcode("reader");

        async function onScan(decodedText) {
            if (isProcessing) return;
            
            // Якщо цей квиток щойно сканували - миттєво червоний екран (захист від копій)
            if (decodedText === lastCode) {
                document.body.className = "scanned-already";
                document.getElementById('info').innerText = "ПОВТОРНИЙ СКАН! ❌";
                return;
            }

            isProcessing = true;
            lastCode = decodedText;

            try {
                // Відправляємо в бот
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: userId,
                        text: `CHECK:${decodedText}`
                    })
                });

                document.body.className = "success";
                document.getElementById('info').innerText = "ОБРОБКА... ⏳";
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

            } catch (e) {
                document.getElementById('info').innerText = "ПОМИЛКА МЕРЕЖІ";
            }

            // Через 2 секунди дозволяємо сканувати наступний інший квиток
            setTimeout(() => {
                document.body.className = "";
                document.getElementById('info').innerText = "ГОТОВИЙ";
                isProcessing = false;
            }, 2000);
            
            // Повністю забуваємо код через 10 секунд, щоб можна було перевірити знову за потреби
            setTimeout(() => { lastCode = ""; }, 10000);
        }

        scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 260 }, onScan);
    </script>
</body>
</html>
