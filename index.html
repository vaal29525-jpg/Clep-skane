<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; overflow: hidden; }
        video { width: 100vw; height: 100vh; object-fit: cover; }
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 10; font-size: 30px; font-weight: bold; 
            text-align: center; padding: 20px; box-sizing: border-box;
        }
    </style>
</head>
<body>
    <video id="video"></video>
    <div id="overlay"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const codeReader = new ZXing.BrowserQRCodeReader();
        const overlay = document.getElementById('overlay');
        let isPaused = false;

        function showResult(text, color) {
            overlay.style.display = 'flex';
            overlay.style.backgroundColor = color;
            overlay.innerHTML = text;
            
            // Вібрація (якщо підтримується пристроєм)
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            
            setTimeout(() => {
                overlay.style.display = 'none';
                isPaused = false;
            }, 2000); // Екран зникає через 2 секунди
        }

        codeReader.decodeFromVideoDevice(undefined, 'video', (result, err) => {
            if (result && !isPaused) {
                isPaused = true;
                const code = result.getText();
                
                // Відправляємо код боту
                tg.sendData("CHECK:" + code);
                
                // Показуємо той самий "прикольний" екран
                showResult("ОБРОБКА...<br><span style='font-size:20px'>Дивіться результат у чаті</span>", "#3390ec");
            }
        });
    </script>
</body>
</html>
