<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; overflow: hidden; }
        video { width: 100vw; height: 100vh; object-fit: cover; background: #000; }
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 10; font-size: 24px; font-weight: bold; 
            text-align: center; background: rgba(51, 144, 236, 0.9);
        }
        .scan-area {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 250px; height: 250px; border: 2px solid #fff; border-radius: 20px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); z-index: 5;
        }
    </style>
</head>
<body>
    <video id="video" playsinline></video>
    <div class="scan-area"></div>
    <div id="overlay">ОБРОБКА...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const codeReader = new ZXing.BrowserQRCodeReader();
        const videoElement = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        let isPaused = false;

        async function initCamera() {
            try {
                // 1. Запитуємо дозвіл прямо
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                videoElement.srcObject = stream;
                
                // 2. Запускаємо логіку зчитування
                codeReader.decodeFromVideoDevice(undefined, 'video', (result, err) => {
                    if (result && !isPaused) {
                        isPaused = true;
                        tg.sendData("CHECK:" + result.getText());
                        
                        overlay.style.display = 'flex';
                        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                        
                        setTimeout(() => {
                            overlay.style.display = 'none';
                            isPaused = false;
                        }, 2500);
                    }
                });
            } catch (e) {
                alert("Помилка камери: " + e.message + "\nПереконайтеся, що надали дозвіл у спливаючому вікні.");
            }
        }

        // Запуск
        initCamera();
    </script>
</body>
</html>
