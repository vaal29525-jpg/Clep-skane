<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Scanner Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --main: #007AFF; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; }
        
        /* Професійний UI */
        .camera-view { position: relative; height: 75vh; background: #111; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 250px; border: 2px solid rgba(255,255,255,0.2); border-radius: 40px; }
        .laser { position: absolute; width: 100%; height: 2px; background: var(--main); box-shadow: 0 0 15px var(--main); top: 0; animation: move 2s infinite linear; }
        
        @keyframes move { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        .ui-panel { height: 25vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .status { color: var(--main); font-size: 14px; margin-bottom: 15px; font-weight: bold; }
        .action-btn { background: var(--main); color: #fff; border: none; padding: 15px 50px; border-radius: 12px; font-weight: bold; width: 100%; }

        #result-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: none; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

    <div class="camera-view">
        <video id="video"></video>
        <div class="overlay"><div class="laser"></div></div>
    </div>

    <div class="ui-panel">
        <div id="msg" class="status">ІНІЦІАЛІЗАЦІЯ ОБ'ЄКТИВА...</div>
        <button class="action-btn" onclick="startScanner()">ПЕРЕЗАВАНТАЖИТИ</button>
    </div>

    <div id="result-screen">
        <div style="padding: 30px; background: #1a1a1a; border-radius: 20px;">
            <h2 id="res-title">ОБРОБКА...</h2>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const reader = new ZXing.BrowserQRCodeReader();
        let isActive = true;

        async function startScanner() {
            const videoElement = document.getElementById('video');
            const msg = document.getElementById('msg');

            try {
                const devices = await reader.listVideoInputDevices();
                const backCam = devices.find(d => d.label.toLowerCase().includes('back')) || devices[0];
                
                msg.innerText = "СКАНЕР АКТИВНИЙ (BACK CAMERA)";

                reader.decodeFromVideoDevice(backCam.deviceId, 'video', (result, error) => {
                    if (result && isActive) {
                        isActive = false;
                        processCode(result.getText());
                    }
                });
            } catch (err) {
                msg.innerText = "ПОМИЛКА КАМЕРИ";
            }
        }

        function processCode(code) {
            document.getElementById('result-screen').style.display = 'flex';
            tg.HapticFeedback.impactOccurred('medium');
            
            // Миттєва відправка даних у бот
            tg.sendData(code);
            
            setTimeout(() => {
                tg.close();
            }, 1000);
        }

        window.onload = startScanner;
    </script>
</body>
</html>
