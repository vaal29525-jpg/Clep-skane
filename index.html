<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Scanner Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; text-align: center; }
        #video { width: 100%; height: 70vh; object-fit: cover; background: #111; }
        .controls { padding: 20px; }
        button { background: #007aff; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 16px; margin: 5px; }
        #status { margin-top: 10px; color: #888; }
        .scan-frame { position: fixed; top: 15vh; left: 10%; width: 80%; height: 40vh; border: 2px solid #007aff; border-radius: 20px; pointer-events: none; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <video id="video"></video>
    <div class="scan-frame"></div>
    
    <div class="controls">
        <div id="status">Пошук камери...</div>
        <button onclick="startScanning()">🔄 ПЕРЕЗАПУСТИТИ КАМЕРУ</button>
        <button onclick="window.location.reload()" style="background: #333;">ОНОВИТИ СТОРІНКУ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const codeReader = new ZXing.BrowserQRCodeReader();
        let currentStream = null;

        async function startScanning() {
            const status = document.getElementById('status');
            
            // Зупиняємо старий потік, якщо він є
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            try {
                // Намагаємося знайти саме ЗАДНЮ камеру
                const constraints = {
                    video: { facingMode: "environment" }
                };

                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                document.getElementById('video').srcObject = currentStream;
                document.getElementById('video').play();
                
                status.innerText = "Камера працює. Скануйте QR.";

                codeReader.decodeFromVideoDevice(undefined, 'video', (result, err) => {
                    if (result) {
                        const code = result.getText();
                        tg.HapticFeedback.notificationOccurred('success');
                        alert("Знайдено: " + code);
                        tg.sendData("SCAN:" + code);
                    }
                });

            } catch (e) {
                status.innerText = "Помилка камери: " + e.message;
                // Спроба запустити будь-яку камеру, якщо environment не спрацював
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(s => { 
                        currentStream = s;
                        document.getElementById('video').srcObject = s;
                        document.getElementById('video').play();
                    });
            }
        }

        window.onload = startScanning;
    </script>
</body>
</html>
