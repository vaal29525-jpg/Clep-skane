<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clap Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; transition: background 0.3s; height: 100vh; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .frame { width: 250px; height: 250px; border: 2px solid rgba(255,255,255,0.2); border-radius: 20px; position: relative; }
        .frame::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #007AFF; box-shadow: 0 0 15px #007AFF; animation: scan 2s infinite; }
        @keyframes scan { 0%, 100% { top: 0; } 50% { top: 100%; } }
        .result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 10; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; }
    </style>
</head>
<body>
    <video id="video"></video>
    <div class="ui"><div class="frame"></div></div>
    <div id="res" class="result-overlay"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const reader = new ZXing.BrowserQRCodeReader();
        const resDiv = document.getElementById('res');

        async function init() {
            try {
                const devices = await reader.listVideoInputDevices();
                const back = devices.find(d => d.label.includes('back')) || devices[0];
                
                reader.decodeFromVideoDevice(back.deviceId, 'video', (result) => {
                    if (result) {
                        // Візуальний ефект успішного зчитування
                        document.body.style.background = "#00ff00";
                        tg.HapticFeedback.notificationOccurred('success');
                        
                        // Відправка даних боту
                        setTimeout(() => {
                            tg.sendData(result.getText());
                        }, 500);
                    }
                });
            } catch (e) { alert("Камера недоступна"); }
        }
        init();
    </script>
</body>
</html>
