<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #video { width: 100%; height: 100vh; object-fit: cover; }
        .ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .frame { width: 260px; height: 260px; border: 3px solid #fff; border-radius: 40px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); position: relative; transition: 0.3s; }
        .line { position: absolute; width: 100%; height: 3px; background: #007aff; top: 0; animation: scan 2s infinite linear; }
        @keyframes scan { 0%, 100% { top: 0; } 50% { top: 100%; } }
        #result { position: fixed; top: 10%; width: 80%; left: 10%; padding: 20px; border-radius: 15px; text-align: center; font-weight: bold; display: none; z-index: 20; }
    </style>
</head>
<body>
    <video id="video"></video>
    <div class="ui"><div class="frame" id="f"><div class="line"></div></div></div>
    <div id="result"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const BOT_TOKEN = '8798649772:AAGIAKWXsgfheC4dw5JhFcGF0EotWFYoaZE';
        const CHAT_ID = tg.initDataUnsafe.user?.id;
        const codeReader = new ZXing.BrowserQRCodeReader();
        let guests = {};
        let isLock = false;

        // Завантаження бази
        try {
            const hash = window.location.hash.substring(1);
            if(hash) guests = JSON.parse(atob(hash));
        } catch(e) { console.error("DB Error"); }

        function show(msg, success) {
            const el = document.getElementById('result');
            const frame = document.getElementById('f');
            el.innerText = msg;
            el.style.display = 'block';
            el.style.background = success ? '#28a745' : '#dc3545';
            frame.style.borderColor = success ? '#28a745' : '#dc3545';
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred(success ? 'success' : 'error');
            
            setTimeout(() => { 
                el.style.display = 'none'; 
                frame.style.borderColor = '#fff';
                isLock = false; 
            }, 3000);
        }

        async function notify(msg) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
        }

        codeReader.decodeFromVideoDevice(undefined, 'video', (result) => {
            if (result && !isLock) {
                isLock = true;
                const id = result.getText();
                if (guests[id]) {
                    if (guests[id].u === 0) {
                        guests[id].u = 1;
                        show(`✅ ${guests[id].n}`, true);
                        notify(`✅ Зайшов: ${guests[id].n}`);
                    } else {
                        show(`❌ ВЖЕ БУВ: ${guests[id].n}`, false);
                    }
                } else {
                    show("⚠️ НЕВІДОМИЙ КОД", false);
                }
            }
        });
    </script>
</body>
</html>
