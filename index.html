<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: #fff; margin: 0; padding: 10px; }
        #reader { width: 100%; max-width: 400px; margin: auto; border: 2px solid #3390ec; border-radius: 10px; }
        #status { margin-top: 15px; font-size: 16px; color: #00ff00; }
    </style>
</head>
<body>
    <h3>QR СКАНЕР (ОСНОВНА КАМЕРА)</h3>
    <div id="reader"></div>
    <div id="status">Пошук камери...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const html5QrCode = new Html5Qrcode("reader");
        
        // Функція запуску саме задньої камери
        function startCamera() {
            html5QrCode.start(
                { facingMode: "environment" }, // Це змушує вмикати задню камеру
                { fps: 20, qrbox: 250 },
                (decodedText) => {
                    document.getElementById('status').innerText = "ЗЧИТАНО!";
                    tg.sendData(decodedText);
                    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                    setTimeout(() => tg.close(), 500);
                }
            ).catch(err => {
                document.getElementById('status').innerText = "Помилка: " + err;
            });
        }

        startCamera();
    </script>
</body>
</html>
