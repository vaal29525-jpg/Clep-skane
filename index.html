<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; background: #000; color: #fff; }
        #reader { width: 100vw; height: 75vh; background: #000; }
        #status { padding: 15px; font-size: 18px; background: #222; color: #0088cc; font-weight: bold; }
    </style>
</head>
<body>
    <div id="status">ЗАКРІПІТЬ БОТА ТА СКАНУЙТЕ</div>
    <div id="reader"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let isScanning = true;
        const scanner = new Html5Qrcode("reader");

        function onScanSuccess(decodedText) {
            if (!isScanning) return;
            isScanning = false;

            document.getElementById('status').innerText = "ОБРОБКА...";
            
            // Відправляємо дані напряму через Telegram Bridge
            tg.sendData(`SCAN:${decodedText}`);
            
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

            setTimeout(() => {
                document.getElementById('status').innerText = "ГОТОВИЙ ДО НАСТУПНОГО";
                isScanning = true;
            }, 2500);
        }

        scanner.start({ facingMode: "environment" }, { fps: 25, qrbox: 250 }, onScanSuccess);
    </script>
</body>
</html>
