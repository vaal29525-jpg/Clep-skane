<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; background: #000; color: #fff; overflow: hidden; }
        #reader { width: 100vw; height: 75vh; background: #000; }
        #status-bar { padding: 15px; font-size: 18px; font-weight: bold; background: #111; border-bottom: 2px solid #3390ec; }
        .flash { animation: flash-anim 0.3s; }
        @keyframes flash-anim { from { background: #3390ec; } to { background: #111; } }
    </style>
</head>
<body>
    <div id="status-bar">ОЧІКУВАННЯ КВИТКА</div>
    <div id="reader"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const botToken = '8798649772:AAGIAKWXsgfheC4dw5JhFcGF0EotWFYoaZE';
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : '5035520641';
        
        let lastCode = "";
        let lastTime = 0;
        const scanner = new Html5Qrcode("reader");

        async function onScan(decodedText) {
            const now = Date.now();
            // Ігноруємо дублікати, якщо минуло менше 5 секунд для ТОГО Ж коду
            if (decodedText === lastCode && (now - lastTime) < 5000) return;
            
            lastCode = decodedText;
            lastTime = now;

            const bar = document.getElementById('status-bar');
            bar.innerText = "ОБРОБКА...";
            bar.classList.add('flash');
            setTimeout(() => bar.classList.remove('flash'), 300);

            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: userId,
                        text: `CHECK:${decodedText}`
                    })
                });
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            } catch (e) {
                bar.innerText = "ПОМИЛКА МЕРЕЖІ";
            }

            setTimeout(() => { bar.innerText = "СКАНУЙТЕ НАСТУПНИЙ"; }, 1500);
        }

        scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 260 }, onScan);
    </script>
</body>
</html>
