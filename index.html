<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .viewport { flex: 1; position: relative; background: #050505; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .box { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 250px; height: 250px; border: 3px solid #007AFF; border-radius: 20px; box-shadow: 0 0 20px #007AFF; }
        .laser { position: absolute; width: 100%; height: 2px; background: #007AFF; top: 0; animation: scan 2s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .footer { padding: 20px; text-align: center; background: #111; font-size: 14px; color: #007AFF; font-weight: bold; }
    </style>
</head>
<body>
    <div class="viewport">
        <video id="video"></video>
        <div class="box"><div class="laser"></div></div>
    </div>
    <div class="footer">CLAP SCANNER PRO v10.0</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const reader = new ZXing.BrowserQRCodeReader();
        let active = true;

        async function init() {
            try {
                const devices = await reader.listVideoInputDevices();
                const back = devices.find(d => d.label.includes('back')) || devices[0];
                reader.decodeFromVideoDevice(back.deviceId, 'video', (res) => {
                    if (res && active) {
                        active = false;
                        tg.HapticFeedback.notificationOccurred('success');
                        tg.sendData(res.getText());
                    }
                });
            } catch (e) { alert("Помилка камери!"); }
        }
        init();
    </script>
</body>
</html>
