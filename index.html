<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #video { width: 100%; height: 100vh; object-fit: cover; }
        .overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 260px; height: 260px; border: 2px solid rgba(255,255,255,0.5); border-radius: 40px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); z-index: 10;
        }
        .scan-line {
            position: absolute; width: 100%; height: 2px; background: #007aff;
            top: 0; left: 0; animation: move 2s infinite linear;
        }
        @keyframes move { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
        #status {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            background: rgba(0,122,255,0.9); padding: 10px 20px; border-radius: 20px;
            display: none; z-index: 20; font-weight: bold;
        }
    </style>
</head>
<body>
    <video id="video" playsinline></video>
    <div class="overlay"><div class="scan-line"></div></div>
    <div id="status">ЗЧИТАНО...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const codeReader = new ZXing.BrowserQRCodeReader();
        const statusMsg = document.getElementById('status');
        let canScan = true;

        async function start() {
            const videoDevice = undefined; // Авто-вибір задньої камери
            
            codeReader.decodeFromVideoDevice(videoDevice, 'video', (result, err) => {
                if (result && canScan) {
                    canScan = false; // Тимчасова пауза, щоб не спамити одним кодом
                    
                    // Вібрація та візуальний відгук
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    statusMsg.style.display = 'block';
                    
                    // Відправка даних боту БЕЗ ЗАКРИТТЯ вікна
                    tg.sendData("CHECK:" + result.getText());

                    // Через 2 секунди знову дозволяємо сканувати наступний квиток
                    setTimeout(() => {
                        statusMsg.style.display = 'none';
                        canScan = true;
                    }, 2000);
                }
            });
        }

        start().catch(err => alert("Помилка: " + err));
    </script>
</body>
</html>
