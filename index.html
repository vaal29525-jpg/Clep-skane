<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clap Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #video { width: 100%; height: 75vh; object-fit: cover; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 250px; border: 3px solid #007aff; border-radius: 40px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); z-index: 5; }
        .panel { height: 25vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; }
        button { background: #007aff; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; width: 80%; }
        #popup { position: fixed; inset: 0; z-index: 20; display: none; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>
    <video id="video" playsinline></video>
    <div class="overlay"></div>
    <div class="panel">
        <div id="status" style="margin-bottom: 10px; color: #007aff;">СТАТУС: ОЧІКУВАННЯ</div>
        <button onclick="startCam()">🔄 УВІМКНУТИ КАМЕРУ</button>
    </div>
    <div id="popup"><h1 id="res"></h1></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const codeReader = new ZXing.BrowserQRCodeReader();

        async function startCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                document.getElementById('video').srcObject = stream;
                await document.getElementById('video').play();
                document.getElementById('status').innerText = "СКАНЕР АКТИВНИЙ";

                codeReader.decodeFromVideoDevice(undefined, 'video', (result) => {
                    if (result) {
                        const isOk = result.getText().startsWith("CLP-");
                        const pop = document.getElementById('popup');
                        pop.style.display = 'flex';
                        pop.style.background = isOk ? "rgba(40, 167, 69, 0.9)" : "rgba(220, 53, 69, 0.9)";
                        document.getElementById('res').innerText = isOk ? "✅ ДОСТУП" : "❌ ВІДМОВА";
                        tg.HapticFeedback.notificationOccurred(isOk ? 'success' : 'error');
                        setTimeout(() => pop.style.display = 'none', 2500);
                    }
                });
            } catch (e) { alert("Помилка камери: " + e); }
        }
        window.onload = startCam;
    </script>
</body>
</html>
