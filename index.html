<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scanner Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #video { width: 100%; height: 100vh; object-fit: cover; position: absolute; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .scanner-box { width: 260px; height: 260px; border: 3px solid #fff; border-radius: 45px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.6); position: relative; }
        .scan-line { position: absolute; width: 100%; height: 3px; background: #007aff; top: 0; animation: scan 2s infinite linear; }
        @keyframes scan { 0%, 100% { top: 0; } 50% { top: 100%; } }
        #status { position: fixed; top: 10%; background: rgba(0,0,0,0.8); padding: 15px 30px; border-radius: 20px; font-weight: bold; display: none; z-index: 20; text-align: center; }
    </style>
</head>
<body>
    <video id="video" playsinline></video>
    <div class="overlay">
        <div class="scanner-box"><div class="scan-line"></div></div>
    </div>
    <div id="status"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const BOT_TOKEN = '8798649772:AAGIAKWXsgfheC4dw5JhFcGF0EotWFYoaZE';
        const CHAT_ID = tg.initDataUnsafe.user?.id;
        
        const codeReader = new ZXing.BrowserQRCodeReader();
        const statusEl = document.getElementById('status');
        let isProcessing = false;

        async function showStatus(text, color) {
            statusEl.innerText = text;
            statusEl.style.display = 'block';
            statusEl.style.color = color;
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred(color === '#28a745' ? 'success' : 'error');
            setTimeout(() => { statusEl.style.display = 'none'; isProcessing = false; }, 2500);
        }

        async function sendToBot(code) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent("🔍 Скан коду: " + code)}`;
            await fetch(url);
        }

        async function startCamera() {
            try {
                const devices = await codeReader.listVideoInputDevices();
                const backCamera = devices.find(d => d.label.toLowerCase().includes('back')) || devices[0];
                
                codeReader.decodeFromVideoDevice(backCamera.deviceId, 'video', (result) => {
                    if (result && !isProcessing) {
                        isProcessing = true;
                        const code = result.getText();
                        sendToBot(code);
                        showStatus("ЗЧИТАНО: " + code, "#28a745");
                    }
                });
            } catch (err) {
                alert("Помилка камери: " + err);
            }
        }

        startCamera();
    </script>
</body>
</html>
