<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clap Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { margin:0; padding:0; background:#000; color:#fff; font-family:sans-serif; overflow:hidden; height:100vh; }
        #reader { width:100%; height:calc(100vh - 120px); }
        .header { padding:15px; text-align:center; background:#111; font-size:18px; font-weight:600; }
        .status { position:absolute; bottom:20px; left:0; right:0; text-align:center; padding:12px; background:rgba(0,0,0,0.7); font-size:16px; }
        button { margin:15px auto; display:block; padding:16px 32px; font-size:17px; background:#007AFF; color:white; border:none; border-radius:12px; }
    </style>
</head>
<body>

    <div class="header">CLAP SCANNER PRO</div>
    <div id="reader"></div>
    <div class="status" id="status">Запуск сканера...</div>
    <button onclick="restartScanner()">ПЕРЕЗАПУСТИТИ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let html5QrCode;

        function startScanner() {
            const status = document.getElementById("status");
            status.textContent = "Запуск камери...";

            html5QrCode = new Html5Qrcode("reader");

            const config = { fps: 15, qrbox: { width: 250, height: 250 } };

            html5QrCode.start(
                { facingMode: "environment" }, 
                config,
                (decodedText) => {
                    tg.HapticFeedback.notificationOccurred("success");
                    document.getElementById("status").innerHTML = `✅ Зчитано: <b>${decodedText}</b>`;
                    tg.sendData(decodedText);
                },
                (error) => {} // не спамити помилками
            ).then(() => {
                status.textContent = "✅ Наведи камеру на QR-код";
            }).catch(err => {
                status.textContent = "❌ " + err;
                console.error(err);
            });
        }

        function restartScanner() {
            if (html5QrCode) html5QrCode.stop();
            startScanner();
        }

        // Автозапуск
        window.onload = startScanner;
    </script>
</body>
</html>
