<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; background: #000; color: #fff; overflow: hidden; }
        #reader { width: 100vw; height: 75vh; background: #000; }
        #status-bar { padding: 15px; font-size: 18px; font-weight: bold; background: #111; border-bottom: 2px solid #3390ec; }
        .success-flash { background: #00ff00 !important; color: #000; }
    </style>
</head>
<body>
    <div id="status-bar">ГОТОВИЙ ДО СКАНУВАННЯ</div>
    <div id="reader"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const botToken = '8798649772:AAGIAKWXsgfheC4dw5JhFcGF0EotWFYoaZE';
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : '5035520641';
        
        let scanningActive = true;
        const scanner = new Html5Qrcode("reader");

        async function onScan(decodedText) {
            if (!scanningActive) return;
            scanningActive = false; // Блокуємо камеру до завершення обробки

            const bar = document.getElementById('status-bar');
            bar.innerText = "ОБРОБКА... ⏳";
            bar.classList.add('success-flash');

            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: userId,
                        text: `CHECK:${decodedText}`
                    })
                });
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } catch (e) {
                bar.innerText = "ПОМИЛКА ЗВ'ЯЗКУ";
            }

            // Пауза 2.5 секунди перед наступним квитком, щоб база встигла оновитися
            setTimeout(() => {
                bar.classList.remove('success-flash');
                bar.innerText = "ШУКАЮ НАСТУПНИЙ...";
                scanningActive = true;
            }, 2500);
        }

        scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 260 }, onScan);
    </script>
</body>
</html>
