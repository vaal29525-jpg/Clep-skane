<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; overflow: hidden; text-align: center; }
        #reader { width: 100vw; height: 100vh; }
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 10; font-size: 24px; font-weight: bold; padding: 20px; box-sizing: border-box;
        }
        .btn-close { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 15px 30px; background: #3390ec; border: none; border-radius: 10px; color: white; font-weight: bold; z-index: 5; }
    </style>
</head>
<body>
    <div id="reader"></div>
    <div id="overlay"></div>
    <button class="btn-close" onclick="window.Telegram.WebApp.close()">ЗАКРИТИ СКАНЕР</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const overlay = document.getElementById('overlay');
        const botToken = '8798649772:AAGIAKWXsgfheC4dw5JhFcGF0EotWFYoaZE';
        let isProcessing = false;

        function showResult(text, color) {
            overlay.style.display = 'flex';
            overlay.style.backgroundColor = color;
            overlay.innerText = text;
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred(color === '#28a745' ? 'success' : 'error');
            
            setTimeout(() => {
                overlay.style.display = 'none';
                isProcessing = false;
            }, 3000); // Результат висить 3 секунди і сканер знову готовий
        }

        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, async (decodedText) => {
            if (isProcessing) return;
            isProcessing = true;

            try {
                // Відправляємо "тихе" повідомлення боту
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: tg.initDataUnsafe.user.id,
                        text: `CHECK_LIVE:${decodedText}`
                    })
                });
                
                // Тимчасово показуємо, що запит пішов
                overlay.style.display = 'flex';
                overlay.style.backgroundColor = 'rgba(0,0,0,0.7)';
                overlay.innerText = "ПЕРЕВІРКА...";
                
            } catch (e) {
                showResult("ПОМИЛКА МЕРЕЖІ", "#ffc107");
            }
        });

        // Слухаємо відповідь від бота (через хитру перевірку статусу в самому боті)
        // Для спрощення: бот сам пришле повідомлення в чат, а ми просто чекаємо 3 сек.
        // Якщо хочеш ідеальну синхронізацію, залиш як є - бот відповість у чат.
    </script>
</body>
</html>
