<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clap Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #000; 
            color: white; 
            font-family: sans-serif; 
            height: 100vh; 
            overflow: hidden;
        }
        #video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
        }
        .info {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            padding: 10px;
        }
        button {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            font-size: 16px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 12px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="info">
        <h3>CLAP SCANNER</h3>
        <p id="status">Запуск...</p>
    </div>

    <video id="video" playsinline autoplay muted></video>
    
    <button onclick="startCamera()">ПЕРЕЗАПУСТИТИ КАМЕРУ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let qrReader = null;

        async function startCamera() {
            const status = document.getElementById('status');
            const video = document.getElementById('video');

            status.textContent = "Запит доступу до камери...";

            try {
                if (qrReader) qrReader.reset();

                qrReader = new ZXing.BrowserQRCodeReader();

                const devices = await qrReader.listVideoInputDevices();
                console.log("Знайдені камери:", devices);

                const preferred = devices.find(d => 
                    d.label.toLowerCase().includes("back") || 
                    d.label.toLowerCase().includes("зад")
                ) || devices[0];

                status.textContent = "Камера знайдена. Запуск...";

                await qrReader.decodeFromVideoDevice(
                    preferred.deviceId, 
                    'video', 
                    (result) => {
                        if (result) {
                            console.log("QR Code:", result.getText());
                            tg.HapticFeedback.notificationOccurred('success');
                            tg.sendData(result.getText());
                            status.textContent = "Код зчитано!";
                        }
                    }
                );

                status.textContent = "✅ Сканер працює";

            } catch (err) {
                console.error("Помилка:", err);
                status.textContent = "❌ " + err.message;
            }
        }

        // Автозапуск
        window.onload = () => {
            startCamera();
        };
    </script>
</body>
</html>
