<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Clap Scanner Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #video { width: 100%; height: 100vh; object-fit: cover; filter: contrast(1.1) brightness(1.1); }
        .ui { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; z-index: 10; }
        .view-box { width: 280px; height: 280px; border: 2px solid rgba(255,255,255,0.4); border-radius: 50px; position: relative; box-shadow: 0 0 0 1000px rgba(0,0,0,0.7); }
        .scan-line { position: absolute; width: 100%; height: 2px; background: #007aff; top: 0; animation: anim 2.5s infinite; box-shadow: 0 0 15px #007aff; }
        @keyframes anim { 0%, 100% { top: 5%; } 50% { top: 95%; } }
        .footer { position: fixed; bottom: 40px; width: 80%; background: rgba(30,30,30,0.9); padding: 15px; border-radius: 20px; text-align: center; backdrop-filter: blur(10px); }
        #result-popup { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: none; align-items: center; justify-content: center; z-index: 100; font-weight: bold; font-size: 24px; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <video id="video"></video>
    <div class="ui">
        <div class="view-box"><div class="scan-line"></div></div>
        <div class="footer">Наведіть камеру на QR-код</div>
    </div>
    <div id="result-popup"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let guests = {};
        let isActive = true;
        const codeReader = new ZXing.BrowserQRCodeReader();

        // Завантаження бази
        try {
            const hash = window.location.hash.substring(1);
            if(hash) guests = JSON.parse(atob(hash));
        } catch(e) { console.error("Data error"); }

        function showResult(title, msg, color) {
            const pop = document.getElementById('result-popup');
            pop.style.background = color;
            pop.innerHTML = `<div>${title}<br><small>${msg}</small></div>`;
            pop.style.display = 'flex';
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred(color.includes('28') ? 'success' : 'error');
            setTimeout(() => { pop.style.display = 'none'; isActive = true; }, 3000);
        }

        async function init() {
            try {
                const constraints = { video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                document.getElementById('video').srcObject = stream;
                
                // Налаштування "Harder Mode" для ZXing
                const hints = new Map();
                hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.QR_CODE]);
                hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

                codeReader.decodeFromVideoDevice(undefined, 'video', (result) => {
                    if (result && isActive) {
                        isActive = false;
                        const code = result.getText();
                        const g = guests[code];
                        if(g) {
                            if(g.s === 0) {
                                g.s = 1;
                                showResult("✅ " + g.n, "ПРОХОДЬТЕ", "#28a745");
                                tg.sendData("USED:" + code);
                            } else {
                                showResult("❌ " + g.n, "ВЖЕ БУВ", "#dc3545");
                            }
                        } else {
                            showResult("⚠️ НЕВІДОМИЙ", "КВИТОК НЕ В БАЗІ", "#ff9500");
                        }
                    }
                });
            } catch (err) { alert("Камера недоступна!"); }
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
