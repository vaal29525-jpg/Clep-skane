<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; background: #000; color: #fff; }
        #reader { width: 100vw; height: 70vh; }
        #res-box { height: 30vh; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; transition: 0.3s; }
        .welcome { background: #28a745; } /* Зелений */
        .already { background: #dc3545; }  /* Червоний */
        .none { background: #ffc107; color: #000; } /* Жовтий */
    </style>
</head>
<body>
    <div id="reader"></div>
    <div id="res-box">ПРИГОТУЙТЕ КВИТОК</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const box = document.getElementById('res-box');
        let isBusy = false;

        // ВАЖЛИВО: Перевір свій токен тут ще раз
        const botToken = '8798649772:AAGIAKWXsgfheC4dw5JhFcGF0EotWFYoaZE';

        const scanner = new Html5Qrcode("reader");

        async function onScan(code) {
            if (isBusy) return;
            isBusy = true;
            
            box.innerText = "ПЕРЕВІРКА...";
            box.className = "";

            try {
                // Відправляємо боту команду спеціального формату
                const resp = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: tg.initDataUnsafe.user.id,
                        text: `SCAN:${code}` // Змінили на SCAN для нового обробника
                    })
                });

                // Ефект вібрації
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                
                box.innerText = "ВІДПРАВЛЕНО! ДИВИСЬ ЧАТ";
                
                // Чекаємо 2 секунди перед наступним гостем
                setTimeout(() => {
                    box.innerText = "СКАНУЙТЕ НАСТУПНИЙ";
                    box.className = "";
                    isBusy = false;
                }, 2000);

            } catch (e) {
                box.innerText = "ПОМИЛКА МЕРЕЖІ";
                isBusy = false;
            }
        }

        scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScan);
    </script>
</body>
</html>
