<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Clap Control Pro Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --primary: #007aff; --success: #28a745; --error: #dc3545; }
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }
        
        #video-container { position: relative; width: 100%; height: 100vh; background: #000; }
        #video { width: 100%; height: 100%; object-fit: cover; }

        /* Дизайн рамки як на вашому скріншоті, але з покращеннями */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .scanner-frame { width: 280px; height: 280px; border: 2px solid rgba(255,255,255,0.3); border-radius: 40px; position: relative; box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); }
        .scanner-frame::before { content: ''; position: absolute; width: 100%; height: 2px; background: var(--primary); top: 0; animation: scan 2.5s infinite ease-in-out; box-shadow: 0 0 15px var(--primary); }
        
        @keyframes scan { 0%, 100% { top: 5%; } 50% { top: 95%; } }

        .status-card { position: fixed; top: 10%; width: 85%; left: 7.5%; padding: 20px; border-radius: 25px; text-align: center; font-size: 20px; font-weight: bold; transform: translateY(-150%); transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 100; backdrop-filter: blur(10px); }
        .status-card.active { transform: translateY(0); }

        .bottom-bar { position: fixed; bottom: 40px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .hint { background: rgba(255,255,255,0.1); padding: 10px 25px; border-radius: 20px; font-size: 14px; backdrop-filter: blur(5px); }
        .btn-restart { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 15px; font-weight: bold; pointer-events: auto; }

        /* Лог помилок для відладки прямо на екрані */
        #debug-log { position: fixed; top: 0; left: 0; font-size: 10px; color: lime; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>
    <div id="debug-log"></div>
    <div id="video-container">
        <video id="video" playsinline></video>
        <div class="overlay">
            <div class="scanner-frame" id="frame"></div>
        </div>
        <div id="status-card" class="status-card"></div>
        <div class="bottom-bar">
            <div class="hint">Наведіть камеру на QR-код гостя</div>
            <button class="btn-restart" onclick="forceCameraRestart()">ПЕРЕЗАПУСТИТИ КАМЕРУ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const video = document.getElementById('video');
        const statusCard = document.getElementById('status-card');
        const frame = document.getElementById('frame');
        const codeReader = new ZXing.BrowserQRCodeReader();
        
        let guests = {};
        let isLocked = false;

        function log(msg) {
            document.getElementById('debug-log').innerHTML += msg + '<br>';
        }

        // Завантаження бази
        function loadDatabase() {
            try {
                const hash = window.location.hash.substring(1);
                if (hash) {
                    guests = JSON.parse(atob(hash));
                    log("Базу завантажено: " + Object.keys(guests).length);
                }
            } catch (e) {
                log("Помилка бази: " + e.message);
            }
        }

        async function showStatus(name, message, type) {
            statusCard.innerHTML = `<div style="font-size: 14px; opacity: 0.8">${name}</div><div>${message}</div>`;
            statusCard.className = 'status-card active';
            statusCard.style.background = type === 'success' ? 'rgba(40, 167, 69, 0.9)' : 'rgba(220, 53, 69, 0.9)';
            frame.style.borderColor = type === 'success' ? 'var(--success)' : 'var(--error)';
            
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred(type === 'success' ? 'success' : 'error');

            setTimeout(() => {
                statusCard.className = 'status-card';
                frame.style.borderColor = 'rgba(255,255,255,0.3)';
                isLocked = false;
            }, 3000);
        }

        async function forceCameraRestart() {
            log("Перезапуск камери...");
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            startScanner();
        }

        async function startScanner() {
            try {
                const constraints = {
                    video: {
                        facingMode: "environment",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                await video.play();
                log("Потік активовано");

                codeReader.decodeFromVideoDevice(undefined, 'video', (result, err) => {
                    if (result && !isLocked) {
                        isLocked = true;
                        const code = result.getText();
                        log("Зчитано: " + code);

                        if (guests[code]) {
                            if (guests[code].u === 0) {
                                guests[code].u = 1;
                                showStatus(guests[code].n, "✅ ПРОХОДЬТЕ", "success");
                                // Відправка даних боту без закриття вікна
                                tg.sendData("CHECKED:" + code); 
                            } else {
                                showStatus(guests[code].n, "❌ ВЖЕ В ЗАЛІ", "error");
                            }
                        } else {
                            showStatus("НЕВІДОМИЙ", "⚠️ КВИТОК НЕ ЗНАЙДЕНО", "error");
                        }
                    }
                });
            } catch (e) {
                log("КРИТИЧНА ПОМИЛКА: " + e.message);
                alert("Доступ до камери заблоковано або зайнято іншою програмою.");
            }
        }

        loadDatabase();
        // Затримка старту на 500мс для стабілізації Telegram WebApp
        setTimeout(startScanner, 500);
    </script>
</body>
</html>
