<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --tg-theme-bg-color: #000; --tg-theme-button-color: #3390ec; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; background-color: var(--tg-theme-bg-color); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { padding: 15px; background: #1a1a1a; border-bottom: 2px solid var(--tg-theme-button-color); text-align: center; font-weight: bold; font-size: 18px; }
        #reader { flex-grow: 1; width: 100%; background: #000; }
        #footer { padding: 20px; background: #1a1a1a; text-align: center; font-size: 14px; color: #888; }
        .highlight { color: var(--tg-theme-button-color); }
    </style>
</head>
<body>
    <div id="header">СИСТЕМА <span class="highlight">CLAP CONTROL</span></div>
    
    <div id="reader"></div>
    
    <div id="footer">Наведіть камеру на QR-код гостя</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Розгорнути на весь екран
        tg.ready();

        let lastResult = "";
        let isProcessing = false;

        function onScanSuccess(decodedText) {
            if (isProcessing || decodedText === lastResult) return;
            
            isProcessing = true;
            lastResult = decodedText;

            // Вібрація при успішному зчитуванні
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }

            // ПЕРЕДАЧА ДАНИХ БОТУ
            // Ця функція закриває сканер і миттєво шле дані в чат як сервісну подію
            tg.sendData("SCAN:" + decodedText);
            
            // Якщо раптом вікно не закрилося саме — закриваємо
            setTimeout(() => {
                tg.close();
            }, 500);
        }

        function onScanFailure(error) {
            // Ми ігноруємо помилки пошуку коду в кадрі, щоб не забивати консоль
        }

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 20, 
                qrbox: {width: 250, height: 250},
                aspectRatio: 1.0
            }, 
            /* verbose= */ false
        );

        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
