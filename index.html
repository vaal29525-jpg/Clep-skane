<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1c1c1c; color: white; padding: 20px; }
        #reader { width: 100%; max-width: 350px; margin: auto; border-radius: 10px; overflow: hidden; }
        #status { margin-top: 20px; color: gold; font-weight: bold; }
    </style>
</head>
<body>
    <h3>QR СКАНЕР</h3>
    <div id="reader"></div>
    <div id="status">Очікування сканування...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function onScanSuccess(decodedText) {
            document.getElementById('status').innerText = "ДАНІ ВІДПРАВЛЕНО: " + decodedText;
            tg.sendData(decodedText); 
            // Даємо Telegram 0.5 сек, щоб відправити дані перед закриттям
            setTimeout(() => { tg.close(); }, 500);
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 200 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
