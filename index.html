<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #video { width: 100%; height: 100vh; object-fit: cover; }
        
        /* Естетичний інтерфейс */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .box { width: 260px; height: 260px; border: 2px solid rgba(255,255,255,0.5); border-radius: 40px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.7); position: relative; transition: all 0.3s; }
        .box::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #007aff; box-shadow: 0 0 15px #007aff; animation: scan 2s infinite linear; }
        
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        #info { position: fixed; bottom: 10%; width: 80%; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 15px; border-radius: 20px; text-align: center; font-size: 18px; z-index: 100; border: 1px solid rgba(255,255,255,0.2); }
        
        .status-popup { position: fixed; top: 15%; padding: 20px 40px; border-radius: 20px; font-weight: bold; font-size: 20px; display: none; z-index: 200; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateY(-100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <video id="video"></video>
    <div class="overlay"><div class="box" id="scannerBox"></div></div>
    <div id="info">Наведіть камеру на QR-код</div>
    <div id="status" class="status-popup"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const codeReader = new ZXing.BrowserQRCodeReader();
        const statusEl = document.getElementById('status');
        const boxEl = document.getElementById('scannerBox');
        let guests = {};
        let isProcessing = false;

        // Завантаження бази даних з URL
        try {
            const hash = window.location.hash.substring(1);
            if (hash) {
                guests = JSON.parse(atob(hash));
                console.log("Базу завантажено:", Object.keys(guests).length, "гостей");
            }
        } catch (e) { console.error("Помилка БД:", e); }

        function showStatus(text, type) {
            statusEl.innerText = text;
            statusEl.style.display = 'block';
            statusEl.style.background = type === 'success' ? '#28a745' : '#dc3545';
            boxEl.style.borderColor = type === 'success' ? '#28a745' : '#dc3545';
            
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred(type === 'success' ? 'success' : 'error');

            setTimeout(() => {
                statusEl.style.display = 'none';
                boxEl.style.borderColor = 'rgba(255,255,255,0.5)';
                isProcessing = false;
            }, 3000);
        }

        async function init() {
            try {
                // Вирішення проблеми "чорного екрану": 
                // 1. Спочатку просто запитуємо потік
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('video').srcObject = stream;
                
                // 2. Даємо камері 500мс "прокинутися" перед початком аналізу
                setTimeout(() => {
                    codeReader.decodeFromVideoDevice(undefined, 'video', (result, err) => {
                        if (result && !isProcessing) {
                            isProcessing = true;
                            const code = result.getText();
                            
                            if (guests[code]) {
                                if (guests[code].u === 0) {
                                    guests[code].u = 1; // Помічаємо як "зайшов" локально
                                    showStatus(`✅ ${guests[code].n}\nПРОХОДЬТЕ`, 'success');
                                    // Відправляємо боту звіт у фоні
                                    tg.sendData(`USED:${code}`); 
                                } else {
                                    showStatus(`❌ ${guests[code].n}\nВЖЕ В ЗАЛІ`, 'error');
                                }
                            } else {
                                showStatus("⚠️ НЕВІДОМИЙ КВИТОК", 'error');
                            }
                        }
                    });
                }, 500);
            } catch (err) {
                alert("Помилка камери: " + err.message);
            }
        }

        init();
    </script>
</body>
</html>
