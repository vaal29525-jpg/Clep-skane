<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clap Scanner Engine</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #0b0b0b; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #video-container { position: relative; width: 100%; height: 65vh; background: #000; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .scanner-frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 260px; height: 260px; border: 3px solid #007aff; border-radius: 40px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.6); z-index: 2; }
        .scanner-line { position: absolute; width: 100%; height: 2px; background: #007aff; top: 0; animation: move 2s infinite ease-in-out; box-shadow: 0 0 15px #007aff; }
        @keyframes move { 0%, 100% { top: 5%; } 50% { top: 95%; } }
        .controls { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; background: #161616; border-top: 1px solid #333; }
        button { width: 80%; background: #007aff; color: white; border: none; padding: 16px; border-radius: 15px; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        #status { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        #overlay-result { position: fixed; inset: 0; z-index: 10; display: none; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="video"></video>
        <div class="scanner-frame"><div class="scanner-line"></div></div>
    </div>
    
    <div class="controls">
        <div id="status">Ініціалізація камери...</div>
        <button onclick="reinitCamera()">🔄 ПЕРЕЗАПУСТИТИ КАМЕРУ</button>
        <button onclick="location.reload()" style="background: #222; font-size: 12px;">ОНОВИТИ МОДУЛЬ</button>
    </div>

    <div id="overlay-result"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const codeReader = new ZXing.BrowserQRCodeReader();
        let currentStream = null;
        let isProcessing = false;

        async function reinitCamera() {
            const status = document.getElementById('status');
            status.innerText = "Спроба доступу до лінзи...";
            
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
            }

            try {
                // Пріоритет на задню камеру високої чіткості
                const constraints = { 
                    video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 } } 
                };
                
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                const videoEl = document.getElementById('video');
                videoEl.srcObject = currentStream;
                videoEl.setAttribute("playsinline", true);
                await videoEl.play();
                
                status.innerText = "Сканер активний. Чекаю QR...";

                codeReader.decodeFromVideoDevice(undefined, 'video', (result, err) => {
                    if (result && !isProcessing) {
                        isProcessing = true;
                        handleScan(result.getText());
                    }
                });
            } catch (e) {
                status.innerText = "Помилка: " + e.message;
                // Резервний метод для старих Android
                navigator.mediaDevices.getUserMedia({ video: true }).then(s => {
                    currentStream = s;
                    document.getElementById('video').srcObject = s;
                    document.getElementById('video').play();
                });
            }
        }

        function handleScan(text) {
            const overlay = document.getElementById('overlay-result');
            const isClap = text.startsWith("CLP-");
            
            overlay.style.display = 'flex';
            if (isClap) {
                overlay.innerText = "✅ ДОСТУП\n" + text;
                overlay.style.background = "rgba(40, 167, 69, 0.9)";
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                overlay.innerText = "❌ НЕВІДОМИЙ\nКОД";
                overlay.style.background = "rgba(220, 53, 69, 0.9)";
                tg.HapticFeedback.notificationOccurred('error');
            }

            setTimeout(() => {
                overlay.style.display = 'none';
                isProcessing = false;
            }, 3000);
        }

        window.onload = reinitCamera;
    </script>
</body>
</html>
