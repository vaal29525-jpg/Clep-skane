<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clap Control Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
        #video { width: 100%; height: 100vh; object-fit: cover; position: fixed; top: 0; left: 0; }
        
        /* Рамка сканера */
        .overlay {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 280px; height: 280px; border: 4px solid #fff; border-radius: 40px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); z-index: 5; transition: border-color 0.3s;
        }
        
        /* Смужка, що бігає */
        .scan-line {
            position: absolute; width: 100%; height: 3px; background: #007aff;
            top: 0; left: 0; animation: move 2s infinite linear;
        }
        @keyframes move { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        /* Плашка результату */
        #result-card {
            position: fixed; bottom: 120px; left: 10px; right: 10px;
            background: rgba(255, 255, 255, 0.95); color: #000;
            padding: 20px; border-radius: 20px; text-align: center;
            display: none; z-index: 100; animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(100px); } to { transform: translateY(0); } }

        /* Історія внизу */
        #history {
            position: fixed; bottom: 0; width: 100%; height: 100px;
            background: rgba(0,0,0,0.8); overflow-y: auto; z-index: 10;
            font-size: 12px; padding: 10px; box-sizing: border-box; border-top: 1px solid #333;
        }
        .history-item { margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 2px; }

        .success { color: #28a745; font-weight: bold; }
        .error { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>
    <video id="video"></video>
    <div class="overlay" id="scanner-frame"><div class="scan-line"></div></div>
    
    <div id="result-card">
        <h2 id="res-title">Перевірка...</h2>
        <p id="res-name"></p>
    </div>

    <div id="history"><b>Останні сканування:</b><br></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const codeReader = new ZXing.BrowserQRCodeReader();
        const resultCard = document.getElementById('result-card');
        const scannerFrame = document.getElementById('scanner-frame');
        const historyDiv = document.getElementById('history');
        
        let guests = {};
        let canScan = true;

        // 1. Завантаження бази з URL
        try {
            const hash = window.location.hash.substring(1);
            if (hash) {
                guests = JSON.parse(atob(hash));
            }
        } catch (e) {
            alert("Помилка завантаження бази!");
        }

        // 2. Функція відображення результату
        function showResult(isValid, title, name) {
            resultCard.style.display = 'block';
            resultCard.style.background = isValid ? '#d4edda' : '#f8d7da';
            document.getElementById('res-title').innerText = title;
            document.getElementById('res-title').className = isValid ? 'success' : 'error';
            document.getElementById('res-name').innerText = name;
            scannerFrame.style.borderColor = isValid ? '#28a745' : '#dc3545';

            // Додаємо в історію
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `<span class="${isValid ? 'success' : 'error'}">${isValid ? '✓' : '✗'}</span> ${name} (${new Date().toLocaleTimeString()})`;
            historyDiv.prepend(item);

            // Вібрація
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred(isValid ? 'success' : 'error');
            }

            // Автоматичне приховування плашки через 3 секунди
            setTimeout(() => {
                resultCard.style.display = 'none';
                scannerFrame.style.borderColor = '#fff';
                canScan = true;
            }, 3000);
        }

        // 3. Запуск камери
        async function startScanner() {
            codeReader.decodeFromVideoDevice(undefined, 'video', (result, err) => {
                if (result && canScan) {
                    canScan = false;
                    const code = result.getText();
                    
                    if (guests[code]) {
                        if (guests[code].u === 0) {
                            guests[code].u = 1; // Помічаємо як використаний локально
                            showResult(true, "✅ ПРОХОДЬТЕ", guests[code].n);
                        } else {
                            showResult(false, "❌ ВЖЕ БУВ", guests[code].n);
                        }
                    } else {
                        showResult(false, "⚠️ НЕЗНАЙОМЕ", "Квиток " + code + " відсутній у базі");
                    }
                }
            });
        }

        startScanner().catch(console.error);
    </script>
</body>
</html>
